services:
  mariadb:
    image: mariadb:10.11
    container_name: nc_mariadb
    restart: unless-stopped
    command:
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
      - --innodb-file-per-table=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --max-allowed-packet=128M
      - --innodb-buffer-pool-size=1G
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: nc_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_net

  nextcloud:
    image: nextcloud:apache
    container_name: nc_app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_DOMAIN}
      REDIS_HOST: redis
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 20G
      APACHE_BODY_LIMIT: 0
      TRUSTED_PROXIES: 172.28.0.0/24
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${NC_DOMAIN}
      OVERWRITECLIURL: https://${NC_DOMAIN}
    volumes:
      - nc_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/80"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Docker Desktop forwards the Windows hosts file into the container's DNS chain, so NC_DOMAIN would otherwise resolve to 127.0.0.1
    extra_hosts:
      - "${NC_DOMAIN}:172.28.0.10"
    networks:
      - nextcloud_net

  cron:
    image: nextcloud:apache
    container_name: nc_cron
    restart: unless-stopped
    entrypoint: /cron.sh
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
    volumes:
      - nc_data:/var/www/html
    extra_hosts:
      - "${NC_DOMAIN}:172.28.0.10"
    networks:
      - nextcloud_net

  nginx:
    image: nginx:1.27-alpine
    container_name: nc_nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    networks:
      nextcloud_net:
        ipv4_address: 172.28.0.10

volumes:
  db_data:
  nc_data:

networks:
  nextcloud_net:
    ipam:
      config:
        - subnet: 172.28.0.0/24
