services:
  mariadb:
    image: mariadb:10.11
    container_name: nc_mariadb
    restart: unless-stopped
    command:
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
      - --innodb-file-per-table=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --max-allowed-packet=128M
      - --innodb-buffer-pool-size=1G
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: nc_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_net

  nextcloud:
    image: nextcloud:apache
    container_name: nc_app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_DOMAIN}
      REDIS_HOST: redis
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 20G
      APACHE_BODY_LIMIT: 0
      TRUSTED_PROXIES: 172.28.0.0/24
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${NC_DOMAIN}
      OVERWRITECLIURL: https://${NC_DOMAIN}
    volumes:
      - nc_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Docker Desktop forwards the Windows hosts file into the container's DNS chain, so NC_DOMAIN would otherwise resolve to 127.0.0.1
    extra_hosts:
      - "${NC_DOMAIN}:172.28.0.10"
    networks:
      - nextcloud_net

  cron:
    image: nextcloud:apache
    container_name: nc_cron
    restart: unless-stopped
    entrypoint: /cron.sh
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
    volumes:
      - nc_data:/var/www/html
    extra_hosts:
      - "${NC_DOMAIN}:172.28.0.10"
    networks:
      - nextcloud_net

  nginx:
    image: nginx:1.27-alpine
    container_name: nc_nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    networks:
      nextcloud_net:
        ipv4_address: 172.28.0.10

  certbot-renew:
    image: certbot/certbot:latest
    container_name: nc_certbot_renew
    restart: unless-stopped
    entrypoint: /scripts/renew-loop.sh
    environment:
      NC_DOMAIN: ${NC_DOMAIN}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nextcloud_net

  # --- monitoring ---

  prometheus:
    image: prom/prometheus:latest
    container_name: nc_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nextcloud_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: nc_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - nextcloud_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: nc_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /run/containerd:/run/containerd:ro
    networks:
      - nextcloud_net

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: nc_mysqld_exporter
    restart: unless-stopped
    # Newer mysqld_exporter dropped DATA_SOURCE_NAME support in favor of a
    # .my.cnf file (to keep the password out of `docker inspect`/process
    # list) - write one from the env at startup instead of committing a
    # file with a secret in it.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/.my.cnf <<-EOF
        [client]
        user=root
        password=${MYSQL_ROOT_PASSWORD}
        host=mariadb
        port=3306
        EOF
        exec /bin/mysqld_exporter --config.my-cnf=/tmp/.my.cnf
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - nextcloud_net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nc_nginx_exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx:8080/stub_status
    depends_on:
      - nginx
    networks:
      - nextcloud_net

  loki:
    image: grafana/loki:latest
    container_name: nc_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - nextcloud_net

  promtail:
    image: grafana/promtail:latest
    container_name: nc_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - nextcloud_net

  grafana:
    image: grafana/grafana:latest
    container_name: nc_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - nextcloud_net

volumes:
  db_data:
  nc_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  nextcloud_net:
    ipam:
      config:
        # Auto-assigned addresses are restricted to the upper half of the
        # subnet so they can never collide with nginx's pinned
        # 172.28.0.10 (needed for TRUSTED_PROXIES / extra_hosts) - without
        # this, whichever container happens to start around the same
        # time as nginx can be handed that same address by Docker's IPAM.
        - subnet: 172.28.0.0/24
          ip_range: 172.28.0.128/25
