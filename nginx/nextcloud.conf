server {
    listen 80;
    listen [::]:80;
    server_name nextcloud-nikita.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nextcloud-nikita.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/nextcloud-nikita.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextcloud-nikita.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Nextcloud Desktop Client
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Nextcloud's own .htaccess already sets X-Content-Type-Options,
    # X-Frame-Options, X-Permitted-Cross-Domain-Policies, X-Robots-Tag and
    # Referrer-Policy
    # HSTS is the one header the app can't reliably set itself.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Apache's own rewrite for these doesn't know the connection is TLS so it redirects to http://
    location = /.well-known/carddav {
        return 301 https://$host/remote.php/dav;
    }
    location = /.well-known/caldav {
        return 301 https://$host/remote.php/dav;
    }

    location / {
        proxy_pass http://nextcloud:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
